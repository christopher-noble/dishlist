extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.6"
    import: ["@key"]
  )

type Query {
  meals(userId: ID!): [Meal!]!
  archivedMeals(userId: ID!): [Meal!]!
  meal(id: ID!): Meal
}

type Mutation {
  createMeal(input: CreateMealInput!): Meal!
  updateMeal(id: ID!, input: UpdateMealInput!): Meal!
  archiveMeal(id: ID!): Meal!
}

enum MealCategory {
  BREAKFAST
  LUNCH
  DINNER
  SNACK
  DESSERT
  BEVERAGE
}

type Meal {
  id: ID!
  name: String!
  description: String!
  imageUrl: String
  category: MealCategory!
  ingredients: [String!]!
  nutritionalInfo: NutritionalInfo
}

type NutritionalInfo {
  calories: Int
  protein: Float
  carbs: Float
  fat: Float
  fiber: Float
}

input CreateMealInput {
  userId: ID!
  name: String!
  description: String!
  imageUrl: String
  category: MealCategory!
  ingredients: [String!]!
  nutritionalInfo: NutritionalInfoInput
}

input UpdateMealInput {
  name: String
  description: String
  imageUrl: String
  category: MealCategory
  ingredients: [String!]
  nutritionalInfo: NutritionalInfoInput
}

input NutritionalInfoInput {
  calories: Int
  protein: Float
  carbs: Float
  fat: Float
  fiber: Float
}

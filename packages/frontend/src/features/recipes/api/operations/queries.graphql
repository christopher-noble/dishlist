query GetRecipes {
  recipes {
    ...RecipeFields
  }
}

query GetArchivedRecipes {
  archivedRecipes {
    ...RecipeFields
  }
}

query GetRecipe($id: ID!) {
  recipe(id: $id) {
    ...RecipeFields
  }
}

query GetRecipeStats {
  recipeStats {
    activeRecipeCount
    archivedLast30DaysCount
  }
}

AWSTemplateFormatVersion: '2010-09-09'
Description: Private S3 media bucket with CloudFront OAC for recipe images.

Parameters:
  ProjectName:
    Type: String
    Default: dishlist
    Description: Project prefix used in resource names.

  EnvironmentName:
    Type: String
    AllowedValues:
      - staging
      - production
    Description: Deployment environment label.

  MediaBucketName:
    Type: String
    Description: Globally unique S3 bucket name for recipe media objects.

  UploadCorsAllowedOrigins:
    Type: CommaDelimitedList
    Default: '*'
    Description: >
      Origins permitted to PUT directly to S3 via presigned URLs
      (e.g. https://app.example.com,http://localhost:8081).

Resources:
  MediaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName:
        Ref: MediaBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - HEAD
            AllowedOrigins:
              Ref: UploadCorsAllowedOrigins
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      Tags:
        - Key: Project
          Value:
            Ref: ProjectName
        - Key: Environment
          Value:
            Ref: EnvironmentName

  MediaOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: '${ProjectName}-${EnvironmentName}-media-oac'
        Description: OAC for private recipe media bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  MediaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment:
          Fn::Sub: '${ProjectName} ${EnvironmentName} recipe media CDN'
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: MediaS3Origin
            DomainName:
              Fn::GetAtt:
                - MediaBucket
                - RegionalDomainName
            OriginAccessControlId:
              Fn::GetAtt:
                - MediaOriginAccessControl
                - Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: MediaS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOacRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource:
              Fn::Sub: '${MediaBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn:
                  Fn::Sub:
                    - arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistributionId}
                    - DistributionId:
                        Ref: MediaDistribution

Outputs:
  MediaBucketName:
    Description: S3 bucket storing recipe image objects (keys only in Postgres).
    Value:
      Ref: MediaBucket
    Export:
      Name:
        Fn::Sub: '${ProjectName}-${EnvironmentName}-MediaBucketName'

  MediaBucketArn:
    Description: ARN of the media bucket.
    Value:
      Fn::GetAtt:
        - MediaBucket
        - Arn
    Export:
      Name:
        Fn::Sub: '${ProjectName}-${EnvironmentName}-MediaBucketArn'

  CloudFrontDistributionId:
    Description: CloudFront distribution serving media via OAC.
    Value:
      Ref: MediaDistribution
    Export:
      Name:
        Fn::Sub: '${ProjectName}-${EnvironmentName}-MediaDistributionId'

  CloudFrontDomainName:
    Description: CloudFront domain — set CLOUDFRONT_DOMAIN to https://<this-value>
    Value:
      Fn::GetAtt:
        - MediaDistribution
        - DomainName
    Export:
      Name:
        Fn::Sub: '${ProjectName}-${EnvironmentName}-CloudFrontDomainName'
